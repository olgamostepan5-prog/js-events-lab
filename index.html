<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JavaScript Events Lab</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>JavaScript Event Handling Lab</h1>


<section>
    <h2>Mouse Events</h2>
    <button id="hoverBtn">Hover Over Me</button>
    <p id="mouseMessage"></p>
</section>


<section>
    <h2>Keyboard Events</h2>
    <input type="text" id="keyboardInput" placeholder="Type something">
    <p id="keyMessage"></p>
</section>


<section>
    <h2>Form Events</h2>
    <form id="myForm">
        <input type="text" placeholder="Enter name" required>
        <button type="submit">Submit</button>
    </form>
    <p id="formMessage"></p>
</section>


<section>
    <h2>Focus and Blur Events</h2>
    <input type="text" id="focusInput" placeholder="Click here">
    <p id="focusMessage"></p>
</section>


<section>
    <h2>Event Delegation</h2>
    <div id="buttonContainer">
        <button>Button 1</button>
        <button>Button 2</button>
        <button>Button 3</button>
    </div>
    <p id="delegateMessage"></p>
</section>

<script src="script.js"></script>

</body>
</html>
